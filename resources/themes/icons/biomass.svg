<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="8" flood-color="#FFFFFF" flood-opacity="0.4"/>
    </filter>
    
    <!-- Reusable shape for a single server rack module -->
    <rect id="rack-unit" x="13" y="14" width="486" height="142" rx="71" />
    
    <!-- Reusable shape for the main vent cutout area -->
    <rect id="vent-area" x="84" y="42" width="386" height="86" rx="43" />
  </defs>

  <style>
    :not(g) > g {
      filter: url(#drop-shadow);
    }
  </style>

  <!-- Mask to punch out the vents and buttons from the server shape -->
  <mask id="cutout-mask">
    <!-- 1. Solid background for the mask -->
    <rect width="512" height="512" fill="white" />
    
    <!-- 2. Punch out the main vent areas (114px vertical spacing) -->
    <use href="#vent-area" y="0" fill="black" />
    <use href="#vent-area" y="114" fill="black" />
    <use href="#vent-area" y="228" fill="black" />
    <use href="#vent-area" y="342" fill="black" />
    
    <!-- 3. Restore the left crescent shape for the power buttons -->
    <circle cx="84" cy="85" r="71" fill="white" />
    <circle cx="84" cy="199" r="71" fill="white" />
    <circle cx="84" cy="313" r="71" fill="white" />
    <circle cx="84" cy="427" r="71" fill="white" />
    
    <!-- 4. Add the horizontal vent dividers -->
    <!-- Rack 1 Dividers (gap on the right) -->
    <rect x="84" y="71" width="315" height="28" fill="white" />
    <rect x="428" y="71" width="42" height="28" fill="white" />
    
    <!-- Rack 2 Dividers (gap on the left) -->
    <rect x="84" y="185" width="114" height="28" fill="white" />
    <rect x="227" y="185" width="243" height="28" fill="white" />
    
    <!-- Rack 3 Divider (solid, no gap) -->
    <rect x="84" y="299" width="386" height="28" fill="white" />
    
    <!-- Rack 4 Dividers (gap near the right) -->
    <rect x="84" y="413" width="306" height="28" fill="white" />
    <rect x="419" y="413" width="51" height="28" fill="white" />
    
    <!-- 5. Punch out the power button holes -->
    <circle cx="84" cy="85" r="43" fill="black" />
    <circle cx="84" cy="199" r="43" fill="black" />
    <circle cx="84" cy="313" r="43" fill="black" />
    <circle cx="84" cy="427" r="43" fill="black" />
  </mask>

  <!-- OUTER GROUP: Applies the drop shadow to the finished shape -->
  <g>
    <!-- INNER GROUP: Builds the server blocks and cuts the holes -->
    <g mask="url(#cutout-mask)" fill="#000000">
      <use href="#rack-unit" y="0" />
      <use href="#rack-unit" y="114" />
      <use href="#rack-unit" y="228" />
      <use href="#rack-unit" y="342" />
    </g>
    
  </g>
</svg>